<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Party shop</title>
</head>
<body>
    <section class="main-section">
        <div class="main-section__container">
            <div class="main-section__container-logo"> PARTY LOGO </div>

            <ul class="main-section__container-offers">
                <li>
                    Shop All <img src="./images/arrow.svg"> 
                </li>
                <li>
                    Occasions <img src="./images/arrow.svg"> 
                </li>
                <li>
                    Themes <img src="./images/arrow.svg"> 
                </li>
                <li>
                    Party Supplies <img src="./images/arrow.svg"> 
                </li>
                <li>
                    Plan My Event <button>New</button> 
                </li>
            </ul>

            <div class="main-section__container-buttons">
                <button>
                    <img src="./images/magnifier.jpg">
                </button>
                <button>
                    <img src="./images/profile.jpg">
                </button>
                <button>
                    <img src="./images/basket.png"> <div>2</div>
                </button>
            </div>
        </div>

        <div class="main-section__poster">
            <div class="main-section__poster-left">
                <div class="main-section__poster-left-firstRow">
                    Make Your Next Party <br> <span class="main-section__poster-left-firstRow-separateWord">Unforgettable.</span>
                </div>

                <div class="main-section__poster-left-secondRow">
                    Shop curated party essentials designed to make hosting effortless.
                </div>
                
                <button class="main-section__poster-left-leftButton">
                    <img src="./images/confetti.png"> Browse Shop
                </button>

                <button class="main-section__poster-left-rightButton">
                    <img src="./images/stars.jpg"> Plan Your Party
                </button>
            </div>

            <div class="main-section__poster-right">
                <img class="main-section__poster-right-women" src="./images/women.png">

                <img class="main-section__poster-right-lolipops" src="./images/lolipops.png"> 
            </div>
        </div>

        <div class="main-section__offers">
            <div>
                Let's Get the Party Started.
            </div>

            <div>
                Pick an occasion to explore matching party supplies.
            </div>

            <button>
                <div> <img> </div> Birthday Party
            </button>

            <button>
                <div> <img> </div> Birthday Party
            </button>

            <button>
                <div> <img> </div> Birthday Party
            </button>

            <button>

            </button>
